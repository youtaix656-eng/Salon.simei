name: Deploy to GitHub Pages

# main ブランチへの push で自動ビルドし、gh-pages ブランチへ公開する。
# gh-pages ブランチが存在すると GitHub Pages が自動で有効になるため、
# リポジトリ設定での手動操作は不要。

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

# 同時デプロイを1本に制限（進行中のものはキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
